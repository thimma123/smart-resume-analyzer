spring.application.name=ApiGateway

server.port=8080

spring.cloud.gateway.routes[0].id=resume-service
spring.cloud.gateway.routes[0].uri=lb://RESUME-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/resume/**

spring.cloud.gateway.routes[1].id=job-service
spring.cloud.gateway.routes[1].uri=lb://JOB-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/job/**

spring.cloud.gateway.routes[2].id=analyzer-service
spring.cloud.gateway.routes[2].uri=lb://ANALYZER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/analyzer/**

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.discovery.enabled=true
spring.cloud.loadbalancer.enabled=true